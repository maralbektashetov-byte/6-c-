<style>

   АКАДЕМИЧЕСКАЯ ТЕМА №5

*{

.controls{

input[type=range]{

svg{

let currentLang='kk';

function setLanguage(lang){
    currentLang=lang;

    document.querySelectorAll('[data-i18n]').forEach(el=>{
        const key=el.dataset.i18n;
        if(translations[lang][key]){
            el.innerHTML=translations[lang][key];
        }
    });

    renderTrainer();
    updateFractionText();
}

/* ==========================================
   FRACTION SVG VISUALIZATION
========================================== */
const svg=document.getElementById("fractionSvg");
const slider=document.getElementById("partsSlider");

function drawFraction(parts){

    document.getElementById("fractionValue").textContent=parts;

    svg.innerHTML='';

    const cx=150;
    const cy=150;
    const r=120;

    for(let i=0;i<parts;i++){

        const start=(i/parts)*2*Math.PI;
        const end=((i+1)/parts)*2*Math.PI;

        const x1=cx+r*Math.cos(start);
        const y1=cy+r*Math.sin(start);

        const x2=cx+r*Math.cos(end);
        const y2=cy+r*Math.sin(end);

        const large=end-start>Math.PI?1:0;

        const path=document.createElementNS("http://www.w3.org/2000/svg","path");

        path.setAttribute("d",
        `M ${cx} ${cy}
         L ${x1} ${y1}
         A ${r} ${r} 0 ${large} 1 ${x2} ${y2}
         Z`);

        path.setAttribute("fill", i===0 ? "#27c6d9":"#dfeef2");
        path.setAttribute("stroke","#23364d");

        svg.appendChild(path);
    }

    updateFractionText();
}

function updateFractionText(){

    const p=slider.value;

    document.getElementById("fractionText").innerHTML=
    currentLang==="kk"
    ? `Көк бөлік: <strong>1/${p}</strong>`
    : `Закрашенная часть: <strong>1/${p}</strong>`;
}

slider.addEventListener("input",()=>{
    drawFraction(slider.value);
});

drawFraction(4);

/* ==========================================
   TRAINER
========================================== */
const tasks = [
["1/2 ?","1/2"],
["2/3 ?","2/3"],
["3/4 ?","3/4"],
["4/5 ?","4/5"],
["5/6 ?","5/6"],
["1/3 ?","1/3"],
["7/8 ?","7/8"],
["2/5 ?","2/5"],
["9/10 ?","9/10"],
["3/8 ?","3/8"]
];

function renderTrainer(){

    const container=document.getElementById("trainer");
    container.innerHTML="";

    tasks.forEach((t,index)=>{

        const div=document.createElement("div");
        div.className="trainer-item";

        div.innerHTML=`
            <p>${index+1}. ${currentLang==="kk"
            ? "Бөлшекті енгіз:"
            : "Введите дробь:"}
            <strong> ${t[0]}</strong></p>

            <input type="text" id="ans${index}">
            <button class="check-btn"
            onclick="checkAnswer(${index})">
            ${currentLang==="kk" ? "Тексеру":"Проверить"}
            </button>

            <div class="feedback" id="fb${index}"></div>
        `;

        container.appendChild(div);
    });
}

function normalize(v){
    return v.replace(/\s+/g,'').toLowerCase();
}

function checkAnswer(index){

    const input=document.getElementById("ans"+index).value;
    const fb=document.getElementById("fb"+index);

    const correct=tasks[index][1];

    fb.style.display="block";

    if(normalize(input)===normalize(correct)){

        fb.className="feedback success";

        fb.textContent=
        currentLang==="kk"
        ? "Дұрыс жауап!"
        : "Правильно!";
    }
    else{

        fb.className="feedback error";

        fb.textContent=
        currentLang==="kk"
        ? "Қате. Қайта көріңіз."
        : "Ошибка. Попробуйте ещё раз.";
    }
}

renderTrainer();
setLanguage('kk');
